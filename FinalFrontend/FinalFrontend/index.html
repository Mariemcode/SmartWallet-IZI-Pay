<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>SmartWallet IZI Pay — Dashboard Admin</title>
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="SmartWallet IZI Pay — Dashboard administrateur du wallet mobile intelligent tunisien">
    <meta name="theme-color" content="#6366f1">
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <!-- Police Inter (moderne, optimisée pour les écrans) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons (utilisé par header, dashboards, etc.) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>
<app-root>
    <!-- Splash screen affiché pendant le chargement initial d'Angular -->
    <div class="initial-loader">
        <div class="initial-loader__logo">
            <svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="4" y="12" width="48" height="36" rx="8" fill="#6366f1"/>
                <rect x="4" y="12" width="48" height="10" rx="8" fill="#4f46e5"/>
                <circle cx="42" cy="30" r="4" fill="#fff"/>
            </svg>
        </div>
        <div class="initial-loader__title">SmartWallet IZI Pay</div>
        <div class="initial-loader__spinner">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
</app-root>

<style>
    /* Splash screen — affiché avant que Angular n'amorce */
    .initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
        font-family: 'Inter', -apple-system, sans-serif;
        animation: splash-fade-in 0.4s ease-out;
    }

    .initial-loader__logo {
        animation: splash-pulse 1.4s ease-in-out infinite;
    }

    .initial-loader__title {
        font-size: 20px;
        font-weight: 700;
        color: #0f172a;
        letter-spacing: -0.01em;
    }

    .initial-loader__spinner {
        display: flex;
        gap: 8px;
    }

    .initial-loader__spinner span {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #6366f1;
        animation: splash-bounce 1.2s ease-in-out infinite;
    }

    .initial-loader__spinner span:nth-child(2) { animation-delay: 0.15s; }
    .initial-loader__spinner span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes splash-fade-in {
        from { opacity: 0; }
        to   { opacity: 1; }
    }

    @keyframes splash-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50%      { transform: scale(1.08); opacity: 0.9; }
    }

    @keyframes splash-bounce {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
        40%           { transform: scale(1);   opacity: 1; }
    }
</style>
</body>
</html>
